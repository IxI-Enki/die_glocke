<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Die Glocke - MCP Server Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Fira+Code:wght@300;400;500;700&family=Source+Code+Pro:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Nerd Font: Fira Code Nerd Font for extended symbols */
    @font-face {
      font-family: 'FiraCode Nerd Font';
      src: url('https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@3.2.1/patched-fonts/FiraCode/Regular/complete/Fira%20Code%20Nerd%20Font%20Complete-Regular.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@3.2.1/patched-fonts/FiraCode/Regular/complete/Fira%20Code%20Nerd%20Font%20Complete-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --color-bg-primary: #0a0e14;
      --color-bg-secondary: #0f1419;
      --color-bg-tertiary: #1a1f2e;
      --color-bg-gradient-start: #1a1e24;
      --color-accent-green: #00ff9d;
      --color-accent-cyan: #00d4ff;
      --color-accent-blue: #4d7cff;
      --color-text-primary: #e6e6e6;
      --color-text-secondary: #4a5568;
      --color-border: #2d3748;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-family: 'Source Code Pro', monospace;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .hidden { display: none !important; }

    .mcp-mono { font-family: 'Source Code Pro', monospace; }
    .mcp-mono-alt { font-family: 'JetBrains Mono', monospace; }
    .mcp-mono-code { font-family: 'FiraCode Nerd Font', 'Fira Code', monospace; }

    .mcp-header {
      position: relative;
      padding: 1.25rem;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0e14 0%, #1a1e24 100%);
      border-bottom: 1px solid var(--color-border);
      box-shadow: 0 4px 12px rgba(0, 255, 157, 0.15);
    }

    /* Dynamic header lighting */
    .mcp-header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(800px 400px at 20% 20%, rgba(0,255,157,0.08), transparent 60%),
        radial-gradient(900px 500px at 80% 80%, rgba(0,212,255,0.07), transparent 60%),
        radial-gradient(1200px 600px at 50% 50%, rgba(77,124,255,0.05), transparent 65%),
        conic-gradient(from 0deg, rgba(0,255,157,0.04), rgba(0,212,255,0.04), rgba(77,124,255,0.04), rgba(0,255,157,0.04));
      animation: header-pulse 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes header-pulse {
      0% { opacity: 0.5; filter: hue-rotate(0deg) saturate(1); }
      100% { opacity: 1; filter: hue-rotate(15deg) saturate(1.2); }
    }
    @keyframes header-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg);} }

    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      justify-content: center;
    }

    .mcp-logo-text {
      font-family: 'Fira Code', monospace;
      font-weight: 700;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--color-accent-green) 0%, var(--color-accent-cyan) 50%, var(--color-accent-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.2em;
      filter: drop-shadow(0 0 20px rgba(0, 255, 157, 0.4));
      animation: logo-glow 4s ease-in-out infinite;
      position: relative;
      z-index: 10;
    }

    @keyframes logo-glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 255, 157, 0.4)); }
      50% { filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.6)); }
    }

    .mcp-subtitle {
      font-family: 'Source Code Pro', monospace;
      font-size: 0.75rem;
      color: var(--color-accent-cyan);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: subtitle-pulse 3s ease-in-out infinite;
    }

    @keyframes subtitle-pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 0.6; }
    }

    .version {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
    }

    /* OCCULT TECHNO SCRIBBLES */
    .occult-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .scribble {
      position: absolute;
      font-family: 'FiraCode Nerd Font', 'Fira Code', monospace;
      font-size: 0.6rem;
      color: rgba(0, 255, 157, 0.15);
      opacity: 0;
      white-space: nowrap;
      will-change: transform, opacity;
    }
    /* PORTAL header logo - distinct from bell */
    .portal-logo { position: relative; width: 110px; height: 110px; margin-right: 0.5rem; }
    .portal-logo .halo { position: absolute; inset: -15%; border-radius: 50%; background:
        radial-gradient(closest-side, rgba(77,124,255,0.35), transparent 70%),
        conic-gradient(from 0deg, rgba(0,255,157,0.12), rgba(0,212,255,0.12), rgba(77,124,255,0.12), rgba(0,255,157,0.12));
      filter: blur(18px); animation: halo-pulse 6s ease-in-out infinite; }
    .portal-logo .core { position:absolute; left:50%; top:50%; width:28px; height:28px; transform: translate(-50%,-50%);
      border-radius: 50%; background: radial-gradient(circle, #0ff 0%, #4d7cff 40%, #0a0e14 65%);
      box-shadow: 0 0 16px rgba(0,255,255,0.6), 0 0 36px rgba(77,124,255,0.45);
      animation: core-breathe 2.8s ease-in-out infinite; }
    .portal-logo .ring { position:absolute; left:50%; top:50%; border: 2px solid rgba(0,212,255,0.45); border-radius:50%; transform: translate(-50%,-50%);
      animation: ring-spin 8s linear infinite; box-shadow: 0 0 8px rgba(0,212,255,0.3); }
    .portal-logo .r1 { width:64px; height:64px; animation-duration: 7s; }
    .portal-logo .r2 { width:86px; height:86px; border-color: rgba(0,255,157,0.35); animation-duration: 11s; }
    .portal-logo .r3 { width:104px; height:104px; border-color: rgba(77,124,255,0.35); animation-duration: 14s; }
    .portal-logo .arc { position:absolute; left:50%; top:50%; width:70px; height:70px; transform: translate(-50%,-50%);
      border-top: 2px solid rgba(255,255,255,0.6); border-left: 2px solid transparent; border-right: 2px solid transparent; border-bottom: 2px solid transparent; border-radius: 50%;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
      animation: arc-orbit 5s linear infinite; mix-blend-mode: screen; }
    .portal-logo .a2 { width:92px; height:92px; animation-duration: 9s; border-top-color: rgba(0,255,157,0.7); }
    .portal-logo .beam { position:absolute; left:50%; top:-10%; width:2px; height:120%; background: linear-gradient(to bottom, rgba(0,255,157,0), rgba(0,255,157,0.8), rgba(0,255,157,0));
      transform: translateX(-50%); mix-blend-mode: screen; animation: beam-scan 3.6s linear infinite; }
    .portal-logo .spark { position:absolute; width:4px; height:4px; border-radius:50%; background: #00ff9d; box-shadow: 0 0 10px #00ff9d, 0 0 18px rgba(0,255,157,0.6);
      animation: spark-fly 2.8s ease-in-out infinite; opacity: 0.85; }
    /* Orbiters around the bell (chaotic) */
    .orbiter { position:absolute; left:50%; top:50%; will-change: transform; }
    .orbiter > span { display:block; font-family: 'FiraCode Nerd Font','Fira Code',monospace; font-size: 0.75rem; color: rgba(0,212,255,0.9); opacity: 0.95; animation: wobble var(--w,3.2s) ease-in-out infinite alternate; }
    @keyframes wobble { 0% { transform: translate(0,0) scale(0.95);} 100% { transform: translate(var(--ox,1.6px), var(--oy,-1.6px)) scale(1.05);} }

    /* Burst particles from center */
    .particle { position:absolute; width: 4px; height: 4px; background: var(--color-accent-green); border-radius: 50%; opacity: 0.7; animation: particle-burst 2.8s ease-out infinite; }
    @keyframes particle-burst {
      0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.9; }
      100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.9); opacity: 0; }
    }

    @keyframes halo-pulse { 0%,100%{ transform: rotate(0deg) scale(1); opacity:0.9;} 50%{ transform: rotate(180deg) scale(1.08); opacity:1; } }
    @keyframes ring-spin { 0%{ transform: translate(-50%,-50%) rotate(0deg);} 100%{ transform: translate(-50%,-50%) rotate(360deg);} }
    @keyframes core-breathe { 0%,100%{ box-shadow: 0 0 16px rgba(0,255,255,0.6), 0 0 36px rgba(77,124,255,0.45);} 50%{ box-shadow: 0 0 24px rgba(0,212,255,0.8), 0 0 52px rgba(77,124,255,0.6);} }
    @keyframes arc-orbit { 0%{ transform: translate(-50%,-50%) rotate(0deg);} 100%{ transform: translate(-50%,-50%) rotate(360deg);} }
    @keyframes beam-scan { 0%{ transform: translateX(-50%) rotate(0deg);} 100%{ transform: translateX(-50%) rotate(360deg);} }
    @keyframes spark-fly { 0%{ transform: translate(0,0) scale(0.8); opacity:0.6;} 50%{ transform: translate(6px,-10px) scale(1.2); opacity:1;} 100%{ transform: translate(-4px,-18px) scale(0.9); opacity:0.7;} }

    /* TIBETAN BELL + SAURON EYE LOGO */
    .bell-container {
      position: relative;
      width: 90px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .tibetan-bell {
      position: absolute;
      width: 60px;
      height: 80px;
      stroke: url(#bellGradient);
      stroke-width: 2;
      fill: none;
      filter: url(#glowFilter);
      animation: float-bell 4s ease-in-out infinite;
    }

    /* Hyper-detailed bell for tool */
    .tool-bell-svg { width: 120px; height: 150px; filter: url(#toolBellGlow) saturate(1.15); animation: bell-swing 3.8s ease-in-out infinite, bell-hue 16s linear infinite; }
    @keyframes bell-swing { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
    @keyframes bell-hue { 0% { filter: url(#toolBellGlow) hue-rotate(0deg) saturate(1.15);} 50% { filter: url(#toolBellGlow) hue-rotate(18deg) saturate(1.35);} 100% { filter: url(#toolBellGlow) hue-rotate(0deg) saturate(1.15);} }
    .bell-metal { fill: url(#cyberMetalGradient); stroke: rgba(140,200,255,0.2); stroke-width: 0.6; }
    .bell-engrave { stroke: rgba(255, 223, 140, 0.7); stroke-width: 0.8; fill: none; opacity: 0.8; }
    .bell-rim { fill: url(#rimNeonGradient); }
    .bell-clapper { fill: url(#clapperNeonGradient); transform-origin: 60px 108px; animation: clapper-swing 3.8s ease-in-out infinite; }
    @keyframes clapper-swing { 0%,100% { transform: rotate(10deg); } 50% { transform: rotate(-10deg); } }
    .bell-shimmer { stroke: rgba(255,255,255,0.9); stroke-width: 1.1; filter: drop-shadow(0 0 8px rgba(255,255,255,0.35)); animation: shimmer-run 2.4s linear infinite; }
    @keyframes shimmer-run { 0% { stroke-dashoffset: 140; } 100% { stroke-dashoffset: 0; } }
    /* AI eye */
    .ai-eye { transform-origin: 60px 88px; }
    .eye-iris { filter: drop-shadow(0 0 8px rgba(0,255,200,0.5)) drop-shadow(0 0 18px rgba(77,124,255,0.45)); }
    .eye-pupil { fill: #000; animation: glance 2.6s ease-in-out infinite; }
    @keyframes glance { 0%,100% { transform: translateX(-1.6px);} 50% { transform: translateX(1.6px);} }
    .eye-lid { transform-origin: 60px 88px; fill: #0a0e14; filter: drop-shadow(0 0 6px rgba(0,0,0,0.5)); animation: blink 6s ease-in-out infinite; opacity: 0.95; }
    @keyframes blink { 0%,92%,100% { transform: scaleY(0.02); } 94% { transform: scaleY(1.2);} 96% { transform: scaleY(0.02);} }

    @keyframes float-bell {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .sauron-eye {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle, #ff3b00 0%, #ff8c00 40%, transparent 70%);
      box-shadow: 0 0 20px #ff3b00, 0 0 40px rgba(255, 59, 0, 0.6);
      animation: eye-pan 4s ease-in-out infinite, eye-pulse 2s ease-in-out infinite alternate;
      overflow: hidden;
    }

    .sauron-pupil {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      background: #000;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: pupil-wiggle 0.8s ease-in-out infinite alternate;
    }

    @keyframes eye-pan {
      0%, 100% { transform: translateX(-4px); }
      25% { transform: translateX(0); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(0); }
    }

    @keyframes eye-pulse {
      0% { box-shadow: 0 0 15px #ff3b00, 0 0 30px rgba(255, 59, 0, 0.5); }
      100% { box-shadow: 0 0 25px #ff8c00, 0 0 50px rgba(255, 140, 0, 0.7); }
    }

    @keyframes pupil-wiggle {
      0% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, -50%) scale(1.1); }
    }

    /* ENERGY RINGS */
    .quantum-ring {
      position: absolute;
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 50%;
      animation: expand-ring 3s linear infinite;
      opacity: 0;
    }

    @keyframes expand-ring {
      0% {
        width: 20px;
        height: 20px;
        opacity: 0.6;
        transform: translate(-50%, -50%);
      }
      100% {
        width: 300px;
        height: 300px;
        opacity: 0;
        transform: translate(-50%, -50%);
      }
    }

    /* FLOATING PARTICLES */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--color-accent-green);
      border-radius: 50%;
      opacity: 0.7;
      animation: particle-rise 3s ease-in-out infinite;
    }

    @keyframes particle-rise {
      0% {
        transform: translateY(0) translateX(0) scale(0.5);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-150px) translateX(var(--dx)) scale(1.2);
        opacity: 0;
      }
    }

    /* CIRCUIT LINES */
    .circuit-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-accent-cyan), transparent);
      animation: circuit-flow 3s linear infinite;
      opacity: 0.6;
    }

    @keyframes circuit-flow {
      0% {
        width: 0;
        left: var(--start);
      }
      100% {
        width: var(--length);
        left: var(--end);
      }
    }

    /* LIGHTNING */
    .lightning {
      position: absolute;
      width: 2px;
      background: linear-gradient(to bottom, white, var(--color-accent-blue));
      opacity: 0;
      animation: lightning-flash 3s ease-in-out infinite;
    }

    @keyframes lightning-flash {
      0%, 91% { opacity: 0; }
      92%, 96% { opacity: 1; }
      97%, 100% { opacity: 0; }
    }

    .container {
      padding: 1rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }

    .mcp-section {
      background: linear-gradient(135deg, var(--color-bg-secondary) 0%, var(--color-bg-tertiary) 100%);
      border: 1px solid var(--color-border);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      padding: 0.75rem;
      transition: all 0.3s ease;
    }

    .mcp-section:hover {
      border-color: var(--color-accent-green);
      box-shadow: 0 0 12px rgba(0, 255, 157, 0.2);
    }

    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--color-accent-blue);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      border-bottom: 2px solid var(--color-accent-green);
      padding-bottom: 0.3rem;
      margin-bottom: 0.8rem;
    }

    .section-title::before {
      content: "≡ ";
    }

    .mcp-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--color-accent-green);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 0.25rem;
    }

    .mcp-input {
      font-family: 'Fira Code', monospace;
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      color: var(--color-text-primary);
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      width: 100%;
      transition: all 0.2s;
      border-radius: 0 !important;
    }

    .mcp-input:focus {
      border-color: var(--color-accent-cyan);
      box-shadow: inset 3px 0 0 var(--color-accent-green), 0 0 10px rgba(0, 212, 255, 0.35);
      outline: none;
      transform: translateY(-1px);
    }

    .mcp-input::placeholder {
      color: var(--color-text-secondary);
      font-style: italic;
    }

    /* PORTAL HERO */
    .portal-hero {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(0,255,157,0.08), transparent 60%),
                  radial-gradient(800px 600px at 80% 90%, rgba(0,212,255,0.07), transparent 55%),
                  linear-gradient(135deg, #0a0e14 0%, #1a1e24 100%);
      overflow: hidden;
      z-index: 5;
    }

    .portal-hero::before {
      content: "";
      position: absolute;
      inset: -20%;
      background: conic-gradient(from 0deg, rgba(0,255,157,0.07), rgba(0,212,255,0.06), rgba(77,124,255,0.05), rgba(0,255,157,0.07));
      filter: blur(80px);
      animation: portal-sweep 16s linear infinite;
      opacity: 0.9;
    }

    .portal-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 3px 3px;
      opacity: 0.25;
      animation: portal-grain 3.5s steps(8) infinite;
      pointer-events: none;
    }

    @keyframes portal-sweep {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.04); }
      100% { transform: rotate(360deg) scale(1); }
    }

    @keyframes portal-grain {
      0%, 100% { transform: translate(0,0); }
      25% { transform: translate(2%, -1%); }
      50% { transform: translate(-2%, 1%); }
      75% { transform: translate(1%, 2%); }
    }

    .portal-title {
      position: relative;
      font-family: 'Fira Code', monospace;
      font-weight: 900;
      font-size: clamp(4rem, 12vw, 18rem);
      letter-spacing: 0.35em;
      background: linear-gradient(135deg, var(--color-accent-green) 0%, var(--color-accent-cyan) 50%, var(--color-accent-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 42px rgba(0,255,157,0.25));
      animation: portal-breathe 6s ease-in-out infinite;
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes portal-breathe {
      0%, 100% { letter-spacing: 0.35em; filter: drop-shadow(0 0 42px rgba(0,255,157,0.25)); }
      50% { letter-spacing: 0.42em; filter: drop-shadow(0 0 60px rgba(0,212,255,0.35)); }
    }

    .portal-version {
      position: relative;
      margin-top: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      color: var(--color-accent-cyan);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      filter: drop-shadow(0 0 10px rgba(0,212,255,0.25));
      animation: subtitle-pulse 3s ease-in-out infinite;
      z-index: 2;
    }

    .mcp-btn {
      font-family: 'Source Code Pro', monospace;
      background: linear-gradient(135deg, var(--color-accent-green) 0%, var(--color-accent-cyan) 100%);
      border: none;
      color: var(--color-bg-primary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.5rem 1.5rem;
      font-size: 0.875rem;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: btn-glow 3s ease-in-out infinite;
      border-radius: 0 !important;
    }

    @keyframes btn-glow {
      0%, 100% { box-shadow: 0 4px 12px rgba(0, 255, 157, 0.3); }
      50% { box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5); }
    }

    .mcp-btn:hover {
      transform: translateY(-2px);
    }

    .add-btn {
      width: 100%;
      text-align: center;
      padding: 0.3rem;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.75rem;
      border: 1px dashed var(--color-accent-green);
      background: transparent;
      color: var(--color-accent-green);
      cursor: pointer;
      margin-top: 0.5rem;
      border-radius: 0 !important;
    }

    .add-btn:hover {
      background: var(--color-accent-green);
      color: var(--color-bg-primary);
    }

    .tool-item, .env-item, .api-item {
      margin-bottom: 0.75rem;
      padding: 0.5rem;
      background: rgba(10, 14, 20, 0.7);
      border: 1px solid var(--color-border);
    }

    .scrollable {
      max-height: 500px;
      overflow-y: auto;
    }

    .env-scrollable {
      max-height: 150px;
      overflow-y: auto;
    }

    /* Login Screen */
    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(0,255,157,0.08), transparent 60%),
                  radial-gradient(800px 600px at 80% 90%, rgba(0,212,255,0.07), transparent 55%);
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: linear-gradient(135deg, var(--color-bg-secondary) 0%, var(--color-bg-tertiary) 100%);
      border: 1px solid var(--color-border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      padding: 1rem;
    }

    .login-title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1rem;
      color: var(--color-accent-blue);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      border-bottom: 2px solid var(--color-accent-green);
      padding-bottom: 0.4rem;
      margin-bottom: 0.9rem;
      text-align: center;
    }

    .login-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
    }

    .login-hint {
      font-size: 0.7rem;
      color: var(--color-text-secondary);
      line-height: 1.4;
      margin-top: 0.5rem;
    }

    .login-error { color: #ff6b6b; font-size: 0.8rem; margin-top: 0.5rem; }
    .login-success { color: #00ff9d; font-size: 0.8rem; margin-top: 0.5rem; }

    /* Modal for generated files */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 40;
    }

    .modal-card {
      width: min(1100px, 96vw);
      max-height: 86vh;
      overflow: auto;
      background: linear-gradient(135deg, var(--color-bg-secondary) 0%, var(--color-bg-tertiary) 100%);
      border: 1px solid var(--color-border);
      box-shadow: 0 10px 28px rgba(0,0,0,0.55);
      padding: 1rem;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 0.5rem;
    }

    .modal-title { font-family: 'JetBrains Mono', monospace; color: var(--color-accent-blue); font-weight: 700; }
    .modal-close { cursor: pointer; color: var(--color-accent-green); font-weight: 700; }

    .file-block { border: 1px solid var(--color-border); padding: 0.5rem; margin: 0.5rem 0; background: rgba(10, 14, 20, 0.7); }
    .file-name { font-family: 'JetBrains Mono', monospace; color: var(--color-accent-cyan); font-size: 0.85rem; }
    .file-actions { display: flex; gap: 0.5rem; margin: 0.4rem 0; }
    .code-block { font-family: 'Fira Code', monospace; font-size: 0.75rem; white-space: pre; overflow-x: auto; background: #0a0e14; padding: 0.5rem; border: 1px solid var(--color-border); }

    /* Tools list */
    .tools-wrapper { padding: 1rem; }
    .tools-list { display: grid; grid-template-columns: repeat(4, minmax(180px, 1fr)); gap: 0.75rem; }
    .tool-card.full { grid-column: 1 / -1; }

    .tool-card {
      border: 1px solid var(--color-border);
      background: linear-gradient(135deg, var(--color-bg-secondary) 0%, var(--color-bg-tertiary) 100%);
      padding: 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .tool-card:hover { border-color: var(--color-accent-green); box-shadow: 0 0 10px rgba(0,255,157,0.12); transform: translateY(-2px); }
    .tool-card-title { font-weight: 700; color: var(--color-accent-blue); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }
    .tool-card-desc { font-size: 0.75rem; color: var(--color-text-primary); opacity: 0.85; margin-top: 0.25rem; }

    .tool-panel { padding: 0 1rem 1rem; }

    /* Tool hero inside card */
    .tool-card-hero {
      position: relative;
      padding: 1rem;
      background: linear-gradient(135deg, var(--color-bg-secondary) 0%, var(--color-bg-tertiary) 100%);
      border: 1px solid var(--color-border);
      overflow: hidden;
      min-height: 140px;
    }
    .tool-card-hero .logo-container { gap: 1rem; }
    .tool-card-hero .occult-layer { z-index: 0; }
    .tool-card-hero .mcp-logo-text { font-size: 1.6rem; letter-spacing: 0.18em; }
    .tool-card-hero .mcp-subtitle { font-size: 0.7rem; }
    .tool-card-hero .version { font-size: 0.7rem; }

    /* Stylized Bell (tool-bell) */
    .bell-svg { width: 140px; height: 180px; filter: drop-shadow(0 0 12px rgba(0,255,180,0.15)); }
    .bell-fill { fill: url(#bellFillGrad); }
    .bell-outline { fill: none; stroke: url(#bellLineGrad); stroke-width: 6; }
    /* Bring the mascot to life */
    #tool-bell .bell-entity { transform-box: fill-box; transform-origin: 50% 18%; animation: ringSwing 2.8s ease-in-out infinite, bellFloat 9s ease-in-out infinite, bellBreath 6.5s ease-in-out infinite, bellSquish 7.5s ease-in-out infinite; filter: drop-shadow(0 10px 24px rgba(0,255,157,0.1)) drop-shadow(0 0 24px rgba(0,212,255,0.08)); }
    #tool-bell .eye-group { transform-box: fill-box; transform-origin: center; }
    #tool-bell .eye-ball { transform-box: fill-box; transform-origin: center; }
    #tool-bell .pupil { animation: eyeLook 5.8s ease-in-out infinite, pupilDart 9s ease-in-out infinite; }
    #tool-bell .aura-ring { mix-blend-mode: screen; filter: blur(6px); }
    #tool-bell .ar1 { animation: auraRotate 10s linear infinite; }
    #tool-bell .ar2 { animation: auraRotate 14s linear infinite reverse; opacity: 0.6; }
    /* eyelids removed per user request */
    #tool-bell .wisp { stroke: url(#wispGrad); stroke-width: 2; fill: none; stroke-linecap: round; filter: blur(1.2px); stroke-dasharray: 140 320; animation: wispDash 6s linear infinite; opacity: 0.55; }
    #tool-bell .wisp.w2 { animation-duration: 8s; opacity: 0.35; }
    #tool-bell .wisp.w3 { animation-duration: 10s; opacity: 0.25; }
    #tool-bell .orbit { transform-origin: 80px 152px; animation: orbitSpin 9s linear infinite; filter: drop-shadow(0 0 6px rgba(0,212,255,0.45)); }
    #tool-bell .orbit.r { animation-duration: 12s; animation-direction: reverse; }
    #tool-bell .sigil { fill: rgba(0,255,157,0.9); }
    #tool-bell .scan { animation: scanMove 2.8s ease-in-out infinite; mix-blend-mode: screen; }
    /* Comets orbiting */
    #tool-bell .comet { transform-origin: 80px 156px; animation: cometSpin var(--spd,8s) linear infinite; }
    #tool-bell .comet .head { fill: #00ffcf; filter: drop-shadow(0 0 8px rgba(0,255,200,0.8)); }
    #tool-bell .comet .tail { stroke: url(#cometGrad); stroke-width: 2.2; stroke-linecap: round; fill: none; }
    /* Clapper + rim wobble */
    #tool-bell .clapper { transform-origin: 80px 176px; animation: clapperSwing 3.8s ease-in-out infinite; }
    #tool-bell .ring { transform-origin: 80px 198px; animation: ringWobble 3.8s ease-in-out infinite; }
    /* Variant swap to show two styles */
    #tool-bell .variant { animation: variantCycle 16s linear infinite; }
    #tool-bell .variant-b { animation-delay: 8s; }
    .bg-orbits { opacity: 0.35; }
    /* Evil eye flames and sound rings */
    #tool-bell .flame { stroke: url(#flameGrad); stroke-width: 8; fill: none; filter: url(#flameNoise); opacity: 0.85; animation: flamePulse 2.6s ease-in-out infinite; }
    #tool-bell .flame.f2 { stroke-width: 5; opacity: 0.55; animation-duration: 3.4s; }
    #tool-bell .sound-ring { stroke: url(#bellLineGrad); stroke-width: 1.4; fill: none; opacity: 0.4; transform-box: fill-box; transform-origin: 50% 60%; animation: soundExpand 2.8s linear infinite; }
    #tool-bell .sound-ring.s2 { animation-delay: .6s; }
    #tool-bell .sound-ring.s3 { animation-delay: 1.2s; }
    #tool-bell .runes { opacity: 0.35; mix-blend-mode: screen; transform-origin: 80px 156px; animation: runesSpin 20s linear infinite; }
    #tool-bell .wander { animation: wander 6s ease-in-out infinite alternate; }

    @keyframes bellFloat {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(-0.4deg); }
    }
    @keyframes ringSwing { 0% { transform: rotate(-6deg);} 50% { transform: rotate(6deg);} 100% { transform: rotate(-6deg);} }
    @keyframes bellSquish { 0%,100% { transform: scaleX(1) scaleY(1);} 50% { transform: scaleX(1.012) scaleY(0.992);} }
    @keyframes bellBreath { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02);} }
    @keyframes eyeLook {
      0% { transform: translate(-10px, -0.5px); }
      40% { transform: translate(10px, 0.5px); }
      60% { transform: translate(10px, 0.5px); }
      100% { transform: translate(-10px, -0.5px); }
    }
    @keyframes pupilDart {
      0% { transform: translate(-4px, -0.5px); }
      22% { transform: translate(2px, -1.5px); }
      48% { transform: translate(6px, 1px); }
      70% { transform: translate(1px, 1.5px); }
      100% { transform: translate(-4px, -0.5px); }
    }
    /* blink animations removed */
    @keyframes auraRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg);} }
    @keyframes wispDash { from { stroke-dashoffset: 320; } to { stroke-dashoffset: 0; } }
    @keyframes orbitSpin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
    @keyframes scanMove { 0% { transform: translateY(-14px);} 50% { transform: translateY(14px);} 100% { transform: translateY(-14px);} }
    @keyframes cometSpin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
    @keyframes clapperSwing { 0%,100% { transform: rotate(-8deg);} 50% { transform: rotate(8deg);} }
    @keyframes ringWobble { 0%,100% { transform: scaleX(1);} 50% { transform: scaleX(1.06);} }
    /* smooth complementary crossfade (variant-b is delayed 8s = half period),
       so the two layers sum to ~full opacity and the bell is never invisible */
    @keyframes variantCycle { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes flamePulse { 0%,100% { stroke-width: 7; opacity: .8; } 50% { stroke-width: 10; opacity: 1; } }
    @keyframes soundExpand { 0% { transform: scale(0.6); opacity: .45; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes runesSpin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
    @keyframes wander { from { transform: translate(-2px,-1px) scale(.9);} to { transform: translate(2px,1px) scale(1.1);} }
    .bell-rim { fill: url(#bellRimGrad); }
    .bell-line { stroke: rgba(0,255,200,0.5); stroke-width: 1.2; fill: none; opacity: 0.6; }
    .vajra-fill { fill: url(#vajraGrad); }
    .vajra-line { stroke: rgba(0,212,255,0.6); stroke-width: 1; fill: none; }

    @media (max-width: 1200px) {
      .container { grid-template-columns: repeat(2, 1fr); }
      .tools-list { grid-template-columns: repeat(2, minmax(180px, 1fr)); }
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      .tools-list { grid-template-columns: 1fr; }
      .mcp-logo-text { font-size: 1.5rem; }
      .bell-container { width: 60px; height: 70px; }
      .tibetan-bell { width: 40px; height: 55px; }
      .sauron-eye { width: 20px; height: 20px; }
    }

    /* ════════════════════════════════════════════════════════════════════
       LIGHT THEME — tasteful fusion of the IxI-Enki Steckbrief (HTL palette
       + neumorphism + soft gradient mesh) with Die Glocke's mono/occult vibe.
       Dark stays default; toggle persists in localStorage.
       ════════════════════════════════════════════════════════════════════ */
    :root { --theme-ease: background-color .45s ease, color .45s ease, border-color .45s ease, box-shadow .45s ease; }
    body, .mcp-header, .mcp-section, .mcp-input, .tool-card, .tool-card-hero,
    .modal-card, .mcp-btn, .add-btn, .section-title, .code-block { transition: var(--theme-ease); }

    /* Theme toggle pill (top-right of header) */
    .theme-toggle {
      position: absolute; top: 50%; right: 1.1rem; transform: translateY(-50%);
      z-index: 30; display: inline-flex; align-items: center; gap: .45rem;
      font-family: 'JetBrains Mono', monospace; font-size: .68rem; font-weight: 500;
      letter-spacing: .12em; text-transform: uppercase; cursor: pointer;
      padding: .42rem .8rem; border-radius: 999px;
      background: rgba(0,212,255,0.08); color: var(--color-accent-cyan);
      border: 1px solid var(--color-border);
      transition: var(--theme-ease), transform .2s ease;
    }
    .theme-toggle:hover { transform: translateY(-50%) translateY(-1px); border-color: var(--color-accent-cyan); box-shadow: 0 0 12px rgba(0,212,255,0.28); }
    .theme-toggle .ic { font-size: .95rem; line-height: 1; }
    .theme-toggle .lbl-dark { display: none; }
    html[data-theme="light"] .theme-toggle { background: rgba(46,79,143,0.06); color: var(--color-accent-blue); }
    html[data-theme="dark"]  .theme-toggle .ic-moon { display: none; }
    html[data-theme="light"] .theme-toggle .ic-sun  { display: none; }
    html[data-theme="light"] .theme-toggle .lbl-light { display: none; }
    html[data-theme="light"] .theme-toggle .lbl-dark  { display: inline; }

    /* ── Light tokens: HTL Steckbrief palette mapped onto Glocke's vars ── */
    html[data-theme="light"] {
      --color-bg-primary:   #eef2f8;
      --color-bg-secondary: #e9eef7;
      --color-bg-tertiary:  #dfe7f5;
      --color-bg-gradient-start: #f3f7fd;
      --color-accent-green: #1f9d8b;  /* teal — bridges Glocke green & HTL blue */
      --color-accent-cyan:  #2E4F8F;  /* HTL primary */
      --color-accent-blue:  #2E4F8F;  /* HTL primary */
      --color-text-primary: #253650;  /* ink */
      --color-text-secondary: #7a90a8;/* muted */
      --color-border: #D8E4F4;
      --color-cta: #F28D2C;           /* HTL accent — primary action */
      --neu-bg: #e6ecf6; --neu-light: #f5f9ff; --neu-dark: #c4cee1;
      --neu-raise-sm: -3px -3px 7px var(--neu-light), 3px 3px 7px var(--neu-dark);
      --neu-raise:    -6px -6px 15px var(--neu-light), 6px 6px 15px var(--neu-dark);
      --neu-inset:    inset -3px -3px 7px var(--neu-light), inset 3px 3px 7px var(--neu-dark);
    }

    /* Soft animated gradient mesh + faint grid behind everything */
    html[data-theme="light"] body { background: var(--color-bg-primary); }
    html[data-theme="light"] body::before {
      content: ""; position: fixed; inset: 0; z-index: -2; pointer-events: none;
      background:
        radial-gradient(48vw 48vw at 8% 4%, rgba(167,186,212,0.55), transparent 70%),
        radial-gradient(46vw 46vw at 92% 36%, rgba(220,168,120,0.42), transparent 72%),
        radial-gradient(52vw 52vw at 30% 98%, rgba(93,118,151,0.40), transparent 74%);
      filter: blur(8px); opacity: .6;
      animation: glk-mesh 28s ease-in-out infinite alternate;
    }
    html[data-theme="light"] body::after {
      content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(46,79,143,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,79,143,0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      -webkit-mask-image: radial-gradient(ellipse 120% 120% at 50% 28%, #000 55%, transparent 95%);
      mask-image: radial-gradient(ellipse 120% 120% at 50% 28%, #000 55%, transparent 95%);
    }
    @keyframes glk-mesh {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(2%,-1.5%) scale(1.04); }
      100% { transform: translate(-2%,2%) scale(1.06); }
    }

    /* Header — soft HTL gradient instead of neon-on-black */
    html[data-theme="light"] .mcp-header {
      background: linear-gradient(135deg, #f3f7fd 0%, #e6ecf6 100%);
      border-bottom: 1px solid var(--color-border);
      box-shadow: 0 6px 18px rgba(46,79,143,0.10);
    }
    html[data-theme="light"] .mcp-header::before {
      background:
        radial-gradient(800px 400px at 18% 20%, rgba(114,173,203,0.20), transparent 60%),
        radial-gradient(900px 500px at 82% 80%, rgba(242,141,44,0.12), transparent 60%);
      filter: none; opacity: .9;
    }
    html[data-theme="light"] .mcp-logo-text {
      background: linear-gradient(135deg, var(--color-accent-blue) 0%, #72ADCB 48%, var(--color-cta) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 8px rgba(46,79,143,0.18));
    }
    html[data-theme="light"] .mcp-subtitle { color: var(--color-accent-blue); }
    html[data-theme="light"] .portal-version { color: var(--color-cta); }
    html[data-theme="light"] .version { color: var(--color-text-secondary); }

    /* Sections + tool cards as neumorphic raised surfaces */
    html[data-theme="light"] .mcp-section,
    html[data-theme="light"] .tool-card,
    html[data-theme="light"] .tool-card-hero {
      background: var(--neu-bg); border: none; border-radius: 14px;
      box-shadow: var(--neu-raise-sm);
    }
    html[data-theme="light"] .mcp-section:hover { border: none; box-shadow: var(--neu-raise); }
    html[data-theme="light"] .tool-card:hover { border: none; box-shadow: var(--neu-raise); transform: translateY(-2px); }
    html[data-theme="light"] .section-title {
      color: var(--color-accent-blue);
      border-bottom: 2px solid color-mix(in srgb, var(--color-cta) 70%, transparent);
    }
    html[data-theme="light"] .mcp-label { color: color-mix(in srgb, var(--color-accent-blue) 78%, var(--color-text-primary)); }
    html[data-theme="light"] .tool-card-title,
    html[data-theme="light"] .modal-title,
    html[data-theme="light"] .file-name { color: var(--color-accent-blue); }
    html[data-theme="light"] .tool-card-desc { color: var(--color-text-primary); opacity: .8; }

    /* Inputs — soft inset wells */
    html[data-theme="light"] .mcp-input {
      background: var(--neu-bg); border: 1px solid var(--color-border);
      color: var(--color-text-primary); border-radius: 8px !important;
      box-shadow: var(--neu-inset);
    }
    html[data-theme="light"] .mcp-input:focus { border-color: var(--color-accent-blue); box-shadow: inset 3px 0 0 var(--color-cta), 0 0 0 3px rgba(46,79,143,0.14); }
    html[data-theme="light"] .mcp-input::placeholder { color: var(--color-text-secondary); }

    /* Buttons — HTL accent CTA */
    html[data-theme="light"] .mcp-btn {
      background: linear-gradient(135deg, var(--color-cta) 0%, #f5a85a 100%);
      color: #fff; border-radius: 10px !important; animation: none;
      box-shadow: 0 6px 16px rgba(242,141,44,0.30);
    }
    html[data-theme="light"] .mcp-btn:hover { box-shadow: 0 9px 22px rgba(242,141,44,0.42); }
    html[data-theme="light"] .add-btn {
      border: 1px dashed var(--color-accent-blue); color: var(--color-accent-blue);
      background: transparent; border-radius: 8px !important;
    }
    html[data-theme="light"] .add-btn:hover { background: var(--color-accent-blue); color: #fff; }

    /* Repeatable item blocks, modal, code */
    html[data-theme="light"] .tool-item,
    html[data-theme="light"] .env-item,
    html[data-theme="light"] .api-item,
    html[data-theme="light"] .file-block { background: rgba(255,255,255,0.5); border: 1px solid var(--color-border); border-radius: 8px; }
    html[data-theme="light"] .modal-overlay { background: rgba(37,54,80,0.35); }
    html[data-theme="light"] .modal-card { background: var(--neu-bg); border: none; box-shadow: var(--neu-raise); border-radius: 16px; }
    html[data-theme="light"] .code-block { background: #f3f6fb; border: 1px solid var(--color-border); color: #2a3a55; border-radius: 8px; }
    html[data-theme="light"] .modal-close { color: var(--color-cta); }
    html[data-theme="light"] label { color: var(--color-text-primary); }

    @media (max-width: 768px) {
      .theme-toggle { right: .6rem; padding: .36rem .6rem; font-size: .6rem; }
      .theme-toggle .lbl-light, .theme-toggle .lbl-dark { display: none; }
      html[data-theme="light"] .theme-toggle .lbl-dark { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      html[data-theme="light"] body::before { animation: none; }
    }

    /* ════════════════════════ FANCY FORMS (both themes) ════════════════════════
       HUD corner brackets + glowing animated section titles + focus accents +
       button shine. Colours flow from the theme tokens, so it fits dark & light. */
    .section-title {
      position: relative; border-bottom: none !important; padding-bottom: .5rem; overflow: visible;
      text-shadow: 0 0 14px color-mix(in srgb, var(--color-accent-cyan) 28%, transparent);
    }
    .section-title::before {
      content: "" !important; display: inline-block; width: 7px; height: 7px; margin-right: .55rem;
      border-radius: 50%; vertical-align: middle;
      background: radial-gradient(circle at 35% 30%, var(--color-cta, #00ff9d), var(--color-accent-cyan));
      box-shadow: 0 0 9px var(--color-accent-cyan);
      animation: pipPulse 2.2s ease-in-out infinite;
    }
    .section-title::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 2px; border-radius: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--color-accent-cyan) 22%, var(--color-cta, var(--color-accent-green)) 50%, var(--color-accent-cyan) 78%, transparent 100%);
      background-size: 220% 100%;
      animation: fancyTitleSweep 5s linear infinite;
    }
    @keyframes pipPulse { 0%,100% { transform: scale(1); opacity: .85; } 50% { transform: scale(1.4); opacity: 1; } }
    @keyframes fancyTitleSweep { 0% { background-position: 140% 0; } 100% { background-position: -140% 0; } }

    /* HUD corner brackets (cyber × neu) */
    .mcp-section { position: relative; }
    .mcp-section::before, .mcp-section::after {
      content: ""; position: absolute; width: 12px; height: 12px; z-index: 2; pointer-events: none;
      opacity: .5; border-color: var(--color-accent-cyan); border-style: solid; border-width: 0;
      transition: opacity .25s ease, border-color .25s ease;
    }
    .mcp-section::before { top: 6px; left: 6px; border-top-width: 2px; border-left-width: 2px; }

  <script>
    /* Theme: dark default, light fusion theme, persisted in localStorage */
    (function () {
      const root = document.documentElement;
      let theme = 'light';
      try { theme = localStorage.getItem('glocke-theme') || 'light'; } catch (e) {}
      root.dataset.theme = theme;
      const apply = (t) => {
        root.dataset.theme = t;
        try { localStorage.setItem('glocke-theme', t); } catch (e) {}
      };
      document.addEventListener('click', (e) => {
        if (e.target.closest('#theme-toggle')) {
          apply(root.dataset.theme === 'light' ? 'dark' : 'light');
        }
      });
    })();

    /* Decode-in scramble on the wordmarks — reveals left-to-right */
    (function () {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const NOISE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#%<>/|*';
      const rand = () => NOISE[(Math.random() * NOISE.length) | 0];
      function scramble(el) {
        const target = el.textContent;
        if (!target) return;
        let frame = 0;
        const total = target.length * 2 + 8;
        const id = setInterval(() => {
          frame++;
          let out = '';
          for (let i = 0; i < target.length; i++) {
            if (target[i] === ' ') { out += ' '; }
            else if (i < frame / 2) { out += target[i]; }
            else { out += rand(); }
          }
          el.textContent = out;
          if (frame >= total) { clearInterval(id); el.textContent = target; }
        }, 45);
      }
      const run = () => document.querySelectorAll('.mcp-logo-text')
        .forEach((el, i) => setTimeout(() => scramble(el), 160 + i * 280));
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
      else run();
    })();

    (async () => {
      try {
        const res = await fetch('version.json', { cache: 'no-store' });
        const data = await res.json();
        const ver = data?.version || '';
        const date = data?.date ? ` • ${data.date}` : '';
        const portalEl = document.getElementById('portal-version');
        if (portalEl) portalEl.textContent = ver;
        const headerEl = document.getElementById('header-version');
        if (headerEl) headerEl.textContent = `${ver}${date}`;
        const toolEl = document.getElementById('tool-version');
        if (toolEl) toolEl.textContent = ver;
        window.__APP_VERSION__ = ver;
      } catch (err) {
        // ignore: version display is non-critical
      }
    })();
  </script>

    "embed-secret":{title:"Include secret in server code",what:"If checked, the literal secret value is baked into the generated source instead of read from the environment.",tips:["Leave OFF — embedding secrets leaks them into images and git.","Only use for a throwaway local demo.","Prefer the Secret Name env var above."],pills:["env var (safe)","⚠ hard-coded"]},
    "base-image":{title:"Docker Base Image",what:"Parent image the server container is built FROM; sets the Python runtime and base OS.",tips:["python:3.x-slim is the safe default (glibc, small).","alpine is tiny but musl can break wheels/C-extensions.","Pin a minor (3.12) for reproducible builds."],pills:["python:3.12-slim","alpine:latest"]},
    "workdir":{title:"Workdir",what:"Absolute path set as WORKDIR inside the container; where app code lives and commands run.",tips:["/app is the convention.","Use an absolute path; COPY targets are relative to it.","Match any volume mounts you plan to add."],pills:["/app"]},
    "user-id":{title:"User ID",what:"Numeric UID of the non-root user the container runs as (USER directive) for least-privilege.",tips:["Keep non-root — 1000 maps to the first normal host user.","Avoid 0 (root); it weakens container isolation.","Match host UID if bind-mounting writable volumes."],pills:["1000","non-root"]},
    "network-access":{title:"Network Access",what:"Whether the container is allowed outbound network; required for any server that calls an external API.",tips:["Enable if your tools hit a Base URL / remote API.","Leave off for fully offline/local-only tools.","stdio servers still need this to reach upstream APIs."],pills:["egress","API calls"]},
    "privileged":{title:"Privileged Mode",what:"Runs the container with --privileged, granting near-host kernel capabilities.",tips:["Leave OFF — almost never needed for an MCP server.","Only for Docker-in-Docker or raw device access.","Privileged + secrets = large blast radius."],pills:["⚠ host caps","default: off"]},
    "transport":{title:"Transport",what:"How MCP clients connect: stdio (local pipe), streamable-http (modern remote) or sse (legacy remote).",tips:["stdio: launched by the client / Docker MCP Gateway — no port.","streamable-http: long-lived remote server on an HTTP port.","sse is deprecated; prefer streamable-http for new servers."],pills:["stdio","streamable-http","sse"]},
    "http-port":{title:"HTTP Port",what:"TCP port the server listens on for HTTP transports; ignored when transport is stdio.",tips:["Only used for streamable-http / sse.","EXPOSE + publish it (-p) when running remotely.","8000 is the FastMCP default."],pills:["8000","http only"]},
    "format-style":{title:"Format Style",what:"How tool responses are formatted before returning to the client — emoji+text, plain or Markdown.",tips:["Emoji+Text reads well in chat clients.","Plain Text is safest for downstream parsing.","Markdown renders tables/links in capable clients."],pills:["Emoji + Text","Markdown"]},
    "timeout":{title:"Timeout (s)",what:"Max seconds an upstream API call may run before the tool aborts with an error.",tips:["Keep short (5–15s) so the LLM isn't left waiting.","Raise only for genuinely slow endpoints.","Pair with Max Retries for transient failures."],pills:["10","per-request"]},
    "max-retries":{title:"Max Retries",what:"How many times a failed upstream request is retried before giving up.",tips:["2–3 is typical with backoff.","Don't retry non-idempotent writes blindly.","0 disables retries entirely."],pills:["3","backoff"]},
    "log-level":{title:"Log Level",what:"Verbosity of the server's logs (Python logging level).",tips:["INFO for normal use; DEBUG while developing.","stdio: keep logs on stderr so they don't corrupt stdout.","WARNING/ERROR for quiet production."],pills:["INFO","DEBUG"]},
    "caching":{title:"Caching",what:"Caches upstream responses to cut latency and API quota usage.",tips:["Memory: per-process, lost on restart — fine for one container.","Redis: shared across replicas, needs a Redis service.","None: always hit the live API."],pills:["Memory","Redis","None"]},
    "cache-ttl":{title:"Cache TTL (s)",what:"How long a cached response stays valid before the API is queried again.",tips:["Match the data's freshness (weather ~300s, static ~hours).","Lower TTL = fresher data, more API calls.","Only applies when Caching isn't None."],pills:["300","freshness"]},
    "health-check":{title:"Health Check Endpoint",what:"Adds a lightweight HTTP health route for liveness/readiness probes.",tips:["Useful for streamable-http behind Docker/K8s/LBs.","Wire it into Docker HEALTHCHECK or a k8s probe.","Little value for pure stdio servers."],pills:["/health","probes"]},
    "metrics":{title:"Metrics Endpoint",what:"Exposes runtime metrics (e.g. Prometheus-style) for monitoring.",tips:["Scrape with Prometheus; visualize in Grafana.","Mainly for long-running remote (HTTP) deployments.","Adds a small dependency/overhead."],pills:["Prometheus","/metrics"]},
    "graceful-shutdown":{title:"Graceful Shutdown",what:"Handles SIGTERM/SIGINT to finish in-flight work and close connections cleanly.",tips:["Keep ON — Docker stop sends SIGTERM.","Prevents dropped requests and leaked sockets on redeploy.","Helps connection-pool / cache cleanup."],pills:["SIGTERM","clean exit"]},
    "single-line-docstrings":{title:"Enforce single-line docstrings",what:"Generates each tool's docstring as one line — a compatibility tweak for strict MCP clients/parsers.",tips:["Keeps tool descriptions terse and uniform.","Helps clients that mishandle multi-line docstrings.","Turn off for richer multi-line tool docs."],pills:["compat","terse docs"]},
    "empty-defaults":{title:"Force empty string defaults",what:"Gives optional string parameters a \"\" default instead of None, so omitted args don't break strict schemas.",tips:["Avoids None-vs-missing issues with some MCP clients.","Tools should treat \"\" as \"not provided\".","Disable if you must distinguish None from empty."],pills:["\"\" default","schema-safe"]},
    "ann-readonly":{title:"readOnlyHint",what:"MCP tool annotation declaring the tool does not modify its environment (read-only).",tips:["Set for pure fetch/query/list tools.","Lets clients treat the call as safe to auto-run.","It's a hint, not enforcement — be honest."],pills:["read-only","annotation"]},
    "ann-idempotent":{title:"idempotentHint",what:"Annotation declaring that repeating the call with the same args has no additional effect.",tips:["GET-like and \"set to X\" operations are idempotent.","Helps clients safely retry on timeout.","Don't set for append/increment/create-new actions."],pills:["safe retry","annotation"]},
    "ann-openworld":{title:"openWorldHint",what:"Annotation signalling the tool touches an open/external world (e.g. the internet) rather than a closed dataset.",tips:["Set when the tool calls a remote API or the web.","Clear it for tools over a fixed local dataset.","Informs how confidently the LLM treats results."],pills:["external API","annotation"]},
    "structured-output":{title:"Structured output",what:"Returns typed/structured results (JSON matching a schema) alongside text, instead of plain text only.",tips:["Great when the LLM should parse fields programmatically.","FastMCP derives the output schema from return type hints.","Leave off for simple human-readable text replies."],pills:["JSON schema","typed result"]},
    "python-dependencies":{title:"Python Dependencies",what:"Pip requirements written to requirements.txt / pyproject and installed in the image.",tips:["mcp[cli]>=1.12.0 is the FastMCP runtime — keep it.","One spec per line; pin versions for reproducibility.","Add the HTTP client you use (e.g. httpx)."],pills:["mcp[cli]>=1.12.0","httpx"]},
    "auto-deps":{title:"Auto-detect Dependencies",what:"Scans the generated tool code for imports and adds matching pip packages automatically.",tips:["Handy when you forget to list a library.","Review results — PyPI name vs import name can differ.","Still pin critical versions by hand."],pills:["import scan","convenience"]},
    "system-packages":{title:"System Packages",what:"OS-level packages installed via apt/apk in the image (build tools, libs some wheels need).",tips:["build-essential for compiling C-extensions.","On alpine the names differ (apk, build-base).","Keep minimal — every package grows the image."],pills:["build-essential","curl"]},
    "auto":{title:"",what:""}
  };

  /* ═══════════ glkhelp: build cards from GLK_HELP + edge-flip. Idempotent. ═══════════ */
  (function () {
    function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function build(host) {
      if (host.dataset.glkInit) return;
      var d = (window.GLK_HELP || {})[host.dataset.help];
      if (!d || !d.title) return;
      host.dataset.glkInit = '1';
      var tips  = (d.tips  || []).map(function(t){ return '<span class="glkhelp-when-item">'+esc(t)+'</span>'; }).join('');
      var pills = (d.pills || []).map(function(p){ return '<span class="glkhelp-pill">'+esc(p)+'</span>'; }).join('');
      host.innerHTML =
        '<button type="button" class="glkhelp-btn" aria-label="Help: '+esc(d.title)+'" tabindex="0">i</button>'+
        '<span class="glkhelp-tip" role="tooltip">'+
          '<span class="glkhelp-top"><span class="glkhelp-title">'+esc(d.title)+'</span></span>'+
          '<span class="glkhelp-desc">'+esc(d.what)+'</span>'+
          (tips  ? '<span class="glkhelp-when"><span class="glkhelp-when-label">Tips · when to use</span>'+tips+'</span>' : '')+
          (pills ? '<span class="glkhelp-related"><span class="glkhelp-rel-label" style="width:100%">Related</span>'+pills+'</span>' : '')+
        '</span>';
      var btn = host.querySelector('.glkhelp-btn');
      // don't let the trigger toggle a checkbox / focus the labelled input
      btn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); });
      var flip = function () {
        var r = host.getBoundingClientRect(), w = innerWidth, half = 131;
        host.dataset.flip = (r.left + r.width/2 - half < 8) ? 'right' : (r.left + r.width/2 + half > w - 8) ? 'left' : '';
        host.dataset.flipV = (r.top < 220) ? 'below' : '';
      };
      host.addEventListener('pointerenter', flip);
      btn.addEventListener('focus', flip);
    }
    function initAll(){ document.querySelectorAll('.glkhelp[data-help]').forEach(build); }
    window.glkhelpInit = initAll;
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initAll); else initAll();
  })();

  /* ═══════════ glkhelp auto-injector: attach ⓘ triggers to labels (no HTML edits) ═══════════ */
  (function () {
    var MAP = [
      ['service-name','for','input-service-name'],['description','for','input-description'],['author','for','input-author'],
      ['category','for','select-category'],['tags','for','input-tags'],['license','for','select-license'],
      ['auth-type','for','select-auth-type'],['header-name','for','input-auth-header'],['secret-name','for','input-secret-name'],
      ['base-image','for','select-base-image'],['workdir','for','input-workdir'],['user-id','for','input-user-id'],
      ['transport','for','select-transport'],['http-port','for','input-http-port'],['format-style','for','select-output-format'],
      ['timeout','for','input-timeout'],['max-retries','for','input-max-retries'],['log-level','for','select-log-level'],
      ['caching','for','select-cache'],['cache-ttl','for','input-cache-ttl'],['python-dependencies','for','input-dependencies'],
      ['system-packages','for','input-sys-deps'],
      ['embed-secret','cb','check-auth-secret-embed'],['network-access','cb','check-docker-network'],['privileged','cb','check-docker-privileged'],
      ['health-check','cb','check-health-check'],['metrics','cb','check-metrics'],['graceful-shutdown','cb','check-graceful-shutdown'],
      ['single-line-docstrings','cb','check-one-line-docstrings'],['empty-defaults','cb','check-empty-defaults'],
      ['ann-readonly','cb','check-ann-readonly'],['ann-idempotent','cb','check-ann-idempotent'],['ann-openworld','cb','check-ann-openworld'],
      ['structured-output','cb','check-structured-output'],['auto-deps','cb','check-auto-deps']
    ];
    function inject(){
      MAP.forEach(function(m){
        var key=m[0], kind=m[1], id=m[2], label=null;
        if(kind==='for'){ label=document.querySelector('label[for="'+id+'"]'); }
        else { var cb=document.getElementById(id); label=cb && cb.closest('label'); }
        if(!label || label.querySelector('.glkhelp[data-help="'+key+'"]')) return;
        var span=document.createElement('span'); span.className='glkhelp'; span.setAttribute('data-help',key);
        label.appendChild(span);
      });
      if(window.glkhelpInit) window.glkhelpInit();
    }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', inject); else inject();
  })();

  /* ═══════════ glkc: number steppers + tag-chip inputs (real input stays canonical) ═══════════ */
  (function () {
    'use strict';
    if (window.__glkcControlsInit) return; window.__glkcControlsInit = true;
    var STEPPERS = {
      'input-timeout':{min:1,max:600,step:1},'input-max-retries':{min:0,max:10,step:1},
      'input-http-port':{min:1,max:65535,step:1},'input-user-id':{min:0,max:65535,step:1},'input-cache-ttl':{min:0,max:86400,step:10}
    };
    var TAG_IDS = ['input-tags','input-docker-packages','input-sys-deps'];
    var TAG_ROW_SELECTOR = '.tool-params';
    function clampNum(v,cfg){ var n=parseInt(String(v).replace(/[^\d-]/g,''),10); if(isNaN(n))n=cfg.min; if(n<cfg.min)n=cfg.min; if(n>cfg.max)n=cfg.max; return n; }
    function fire(input){ input.dispatchEvent(new Event('input',{bubbles:true})); input.dispatchEvent(new Event('change',{bubbles:true})); }
    function initStepper(input,cfg){
      if(!input || input.dataset.glkc==='1') return; input.dataset.glkc='1';
      input.setAttribute('inputmode','numeric');
      var wrap=document.createElement('div'); wrap.className='glkc-step'; wrap.setAttribute('data-glkc-step','1');
      var dec=document.createElement('button'); dec.type='button'; dec.className='glkc-step-btn glkc-step-dec'; dec.tabIndex=-1; dec.setAttribute('aria-label','Decrease'); dec.textContent='−';
      var inc=document.createElement('button'); inc.type='button'; inc.className='glkc-step-btn glkc-step-inc'; inc.tabIndex=-1; inc.setAttribute('aria-label','Increase'); inc.textContent='＋';
      input.parentNode.insertBefore(wrap,input); wrap.appendChild(dec); wrap.appendChild(input); wrap.appendChild(inc);
      function setVal(n,doFire){ var c=clampNum(n,cfg); input.value=String(c); dec.disabled=c<=cfg.min; inc.disabled=c>=cfg.max; if(doFire)fire(input); }
      function bump(dir){ var cur=parseInt(input.value,10); if(isNaN(cur))cur=cfg.min; setVal(cur+dir*cfg.step,true); }
      dec.addEventListener('click',function(){ bump(-1); }); inc.addEventListener('click',function(){ bump(1); });
      input.addEventListener('keydown',function(e){ if(e.key==='ArrowUp'){e.preventDefault();bump(1);} else if(e.key==='ArrowDown'){e.preventDefault();bump(-1);} else if(e.key==='Enter'){setVal(input.value,true);} });
      input.addEventListener('blur',function(){ setVal(input.value,false); });
      setVal(input.value,false);
    }
    function parseTags(str){ return String(str||'').split(',').map(function(s){return s.trim();}).filter(function(s,i,a){return s.length && a.indexOf(s)===i;}); }
    function initTag(input){
      if(!input || input.dataset.glkc==='1') return; input.dataset.glkc='1';
      var ph=input.getAttribute('placeholder')||'Add…';
      var wrap=document.createElement('div'); wrap.className='glkc-tag'; wrap.setAttribute('data-glkc-tag','1');
      input.parentNode.insertBefore(wrap,input); wrap.appendChild(input);
      input.classList.add('glkc-tag-store'); input.style.display='none';   /* store only; generator reads its value */
      var typer=document.createElement('input'); typer.type='text'; typer.className='glkc-tag-real'; typer.setAttribute('autocomplete','off'); typer.placeholder=ph;
      wrap.appendChild(typer);
      var tags=parseTags(input.value);
      function writeBack(){ input.value=tags.join(', '); fire(input); }
      function render(){
        Array.prototype.slice.call(wrap.querySelectorAll('.glkc-chip')).forEach(function(c){ c.remove(); });
        tags.forEach(function(t){
          var chip=document.createElement('span'); chip.className='glkc-chip';
          var lbl=document.createElement('span'); lbl.className='glkc-chip-label'; lbl.textContent=t; lbl.title=t;
          var x=document.createElement('button'); x.type='button'; x.className='glkc-chip-x'; x.setAttribute('aria-label','Remove '+t); x.textContent='×';
          x.addEventListener('click',function(){ var i=tags.indexOf(t); if(i>-1){ tags.splice(i,1); writeBack(); render(); } typer.focus(); });
          chip.appendChild(lbl); chip.appendChild(x); wrap.insertBefore(chip,typer);
        });
      }
      function commit(){ var added=parseTags(typer.value); var changed=false; added.forEach(function(t){ if(tags.indexOf(t)===-1){ tags.push(t); changed=true; } }); typer.value=''; if(changed){ writeBack(); render(); } }
      typer.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===','){ e.preventDefault(); commit(); } else if(e.key==='Backspace' && typer.value==='' && tags.length){ tags.pop(); writeBack(); render(); } });
      typer.addEventListener('input',function(){ if(typer.value.indexOf(',')!==-1) commit(); });
      typer.addEventListener('blur',commit);
      wrap.addEventListener('mousedown',function(e){ if(e.target===wrap){ e.preventDefault(); typer.focus(); } });
      render(); writeBack();
    }
    function scan(){
      Object.keys(STEPPERS).forEach(function(id){ var el=document.getElementById(id); if(el) initStepper(el,STEPPERS[id]); });
      TAG_IDS.forEach(function(id){ var el=document.getElementById(id); if(el) initTag(el); });
      document.querySelectorAll(TAG_ROW_SELECTOR).forEach(function(el){ initTag(el); });
    }
    function boot(){
      scan();
      var obs=new MutationObserver(function(muts){ muts.forEach(function(m){ m.addedNodes && Array.prototype.forEach.call(m.addedNodes,function(n){ if(n.nodeType!==1) return; if(n.matches && n.matches(TAG_ROW_SELECTOR)) initTag(n); if(n.querySelectorAll) n.querySelectorAll(TAG_ROW_SELECTOR).forEach(initTag); }); }); });
      ['tools-container','env-vars-container','apis-container'].forEach(function(cid){ var c=document.getElementById(cid); if(c) obs.observe(c,{childList:true,subtree:true}); });
    }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
  })();

  /* ═══════════ glkx: live step / progress updater ═══════════ */
  (function () {
    function init(){
      var root=document.getElementById('tool-mcp-generator'); if(!root || root.__glkxInit) return; root.__glkxInit=true;
      var toggles=function(){ return root.querySelectorAll('.glkx-acc-toggle'); };
      var setAll=function(checked){ toggles().forEach(function(cb){ cb.checked=checked; }); };
      var ex=document.getElementById('glkx-expand-all'), co=document.getElementById('glkx-collapse-all');
      if(ex) ex.addEventListener('click',function(){ setAll(false); }); if(co) co.addEventListener('click',function(){ setAll(true); });
      var steps=Array.prototype.slice.call(root.querySelectorAll('.glkx-step-node'));
      var lines=Array.prototype.slice.call(root.querySelectorAll('.glkx-step-line'));
      var meterEl=document.getElementById('glkx-step-meter');
      var hasVal=function(sel){ var el=root.querySelector(sel); return !!(el && String(el.value||'').trim()); };
      var checks=[
        function(){ return hasVal('#input-service-name') && hasVal('#input-description'); },
        function(){ return hasVal('.tool-name') && hasVal('.tool-desc'); },
        function(){ return hasVal('#select-transport'); },
        function(){ return false; }
      ];
      function update(){
        checks.forEach(function(fn,i){ var done=!!fn(); var node=steps[i]; if(!node) return; node.classList.toggle('is-done',done); node.classList.remove('is-active'); if(i>0 && lines[i-1]) lines[i-1].classList.toggle('is-filled',!!checks[i-1]()); });
        var activeSet=false;
        for(var i=0;i<steps.length;i++){ if(!checks[i]()){ steps[i].classList.add('is-active'); activeSet=true; break; } }
        if(!activeSet && steps[steps.length-1]) steps[steps.length-1].classList.add('is-active');
        var filled=0,total=0;
        root.querySelectorAll('.mcp-input').forEach(function(el){ if(el.type==='checkbox') return; total++; if(String(el.value||'').trim()) filled++; });
        if(meterEl) meterEl.textContent=(total?Math.round(filled/total*100):0)+'% ready';
      }
      root.addEventListener('input',update); root.addEventListener('change',update);
      var gen=document.getElementById('btn-generate');
      if(gen) gen.addEventListener('click',function(){ steps.forEach(function(s){ s.classList.add('is-done'); }); lines.forEach(function(l){ l.classList.add('is-filled'); }); if(meterEl) meterEl.textContent='generated ✓'; });
      update();
    }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
  })();
  </script>
